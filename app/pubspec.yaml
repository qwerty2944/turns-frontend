name: turns_app
description: "턴즈 — 보드게임 크로스플레이 앱 (Flutter 셸 + 인게임 WebView)"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # state / DI
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # network
  dio: ^5.7.0
  retrofit: ^4.4.1

  # models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # routing / storage
  go_router: ^17.3.0
  shared_preferences: ^2.3.2

  # in-game webview + local web bundle server
  flutter_inappwebview: ^6.1.5
  archive: ^4.0.2
  shelf: ^1.4.1
  shelf_static: ^1.1.2
  path_provider: ^2.1.4
  package_info_plus: ^10.2.0
  wakelock_plus: ^1.2.8

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  retrofit_generator: ^10.2.7
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/web.zip
